<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RATP Dev Casablanca - Ronde</title>
    <style>
        :root {
            --ratp-blue: #0055A4;
            --ratp-green: #009688;
            --bg-gray: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-top: 6px solid var(--ratp-blue);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        /* Vos deux logos officiels */
        .logo-casa { width: 160px; height: auto; margin-bottom: 15px; }
        .logo-ratp { width: 180px; height: auto; }

        h2 {
            color: var(--ratp-blue);
            font-size: 1.1rem;
            margin: 0;
            padding: 15px;
            background: #f9f9f9;
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
        }

        .container { padding: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            appearance: none;
            background-color: #fff;
        }

        .btn-taguer {
            width: 100%;
            background-color: var(--ratp-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #status {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="logo_casa_group.png" alt="Logo Casa" class="logo-casa">
        <br>
        <img src="logo_ratp_dev_casa.png" alt="Logo RATP Dev" class="logo-ratp">
    </div>

    <h2>Contrôleur de Ronde</h2>

    <div class="container">
        <label>Réseau / Ligne</label>
        <select id="ligne">
            <option value="">-- Choisir la ligne --</option>
            <option>T1</option>
            <option>T2</option>
            <option>T3</option>
            <option>T4</option>
            <option>BW1</option>
            <option>BW2</option>
        </select>

        <label>Nom de la Station</label>
        <select id="station">
            <option value="">-- Sélectionner Station --</option>
        </select>

        <label>Chef de Zone</label>
        <select id="chef">
            <option value="">-- Sélectionner Chef --</option>
        </select>

        <button class="btn-taguer" onclick="valider()">Taguer</button>
        <div id="status"></div>
    </div>
</div>

<script>
    function valider() {
        const btn = document.querySelector('.btn-taguer');
        const status = document.getElementById('status');
        
        btn.innerHTML = "Localisation...";
        status.innerHTML = "🛰️ Recherche du signal GPS...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                alert("✅ Ronde validée !\nCoordonnées : " + position.coords.latitude + ", " + position.coords.longitude);
                btn.innerHTML = "Taguer";
                status.innerHTML = "✅ Position enregistrée";
            }, () => {
                alert("❌ Erreur : Activez le GPS sur votre téléphone.");
                btn.innerHTML = "Taguer";
                status.innerHTML = "";
            });
        }
    }
</script>

</body>
</html>
