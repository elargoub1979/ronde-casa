<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RATP Dev Casablanca - Contrôle</title>
    <style>
        :root {
            --ratp-blue: #0055A4;    /* Bleu pour Taguer */
            --ratp-green: #28a745;   /* Vert pour Prise de Service */
            --ratp-red: #dc3545;     /* Rouge pour Fin de Service */
            --bg-gray: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            width: 95%;
            max-width: 420px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-top: 6px solid var(--ratp-blue);
            overflow: hidden;
            margin: 10px 0;
        }

        .header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .logo-casa { width: 140px; height: auto; margin-bottom: 8px; }
        .logo-ratp { width: 150px; height: auto; }

        h2 {
            color: var(--ratp-blue);
            /* --- MODIFICATION DE LA TAILLE DE POLICE DU TITRE --- */
            font-size: 0.85rem; /* Ajustez cette valeur pour faire tenir sur une ligne */
            margin: 0;
            padding: 12px;
            background: #f9f9f9;
            text-transform: uppercase;
            text-align: center;
            font-weight: bold;
            white-space: nowrap; /* Empêche le retour à la ligne */
            overflow: hidden; /* Cache le texte qui dépasse */
            text-overflow: ellipsis; /* Ajoute des points de suspension si nécessaire */
        }

        .container { padding: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            color: #444;
            font-size: 0.8rem;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fff;
        }

        /* --- Organisation des Boutons --- */
        .btn-group-top {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Deux colonnes égales */
            gap: 10px;
            margin-bottom: 10px; /* Espace avant le bouton Taguer */
        }

        .btn {
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            width: 100%;
        }

        /* Couleurs demandées */
        .btn-prise { background-color: var(--ratp-green); } /* VERT */
        .btn-fin { background-color: var(--ratp-red); }     /* ROUGE */
        
        /* Bouton Taguer en dessous, pleine largeur */
        .btn-taguer { 
            background-color: var(--ratp-blue); /* BLEU */
            width: 100%; 
            padding: 20px; /* Un peu plus grand */
            font-size: 1.1rem;
        }

        .btn:active { transform: scale(0.96); filter: brightness(0.9); }

        #status {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 10px;
            font-weight: bold;
            min-height: 1.1rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="logo_casa_group.png" alt="Logo Casa" class="logo-casa">
        <br>
        <img src="logo_ratp_dev_casa.png" alt="Logo RATP Dev" class="logo-ratp">
    </div>

    <h2>contrôleur de ronde / prise de service</h2>

    <div class="container">
        <label>Service</label>
        <select id="service">
            <option value="">-- Choisir le service --</option>
            <option value="Matin">Matin</option>
            <option value="Mixte">Mixte</option>
            <option value="Soir">Soir</option>
        </select>

        <label>Dépôt / Réseau / Ligne</label>
        <select id="ligne" onchange="updateStations()">
            <option value="">-- Choisir --</option>
            <optgroup label="Dépôts">
                <option value="Dépôt Hantat">Dépôt Hantat</option>
                <option value="Dépôt Sidi Moumen">Dépôt Sidi Moumen</option>
                <option value="Dépôt CDR">Dépôt CDR</option>
                <option value="Dépôt Sidi Bernoussi">Dépôt Sidi Bernoussi</option>
            </optgroup>
            <optgroup label="Tramway / Busway">
                <option value="T1">T1</option>
                <option value="T2">T2</option>
                <option value="T3">T3</option>
                <option value="T4">T4</option>
                <option value="BW1">BW1</option>
                <option value="BW2">BW2</option>
            </optgroup>
        </select>

        <label>Nom du Lieu / Station</label>
        <select id="station">
            <option value="">-- Sélectionner Lieu --</option>
        </select>

        <label>Nom du Chef de Zone</label>
        <select id="chef">
            <option value="">-- Sélectionner Chef --</option>
        </select>

        <div class="btn-group-top">
            <button class="btn btn-prise" onclick="valider('PRISE DE SERVICE')">Prise de Service</button>
            <button class="btn btn-fin" onclick="valider('FIN DE SERVICE')">Fin de Service</button>
        </div>
        
        <button class="btn btn-taguer" onclick="valider('TAGUER (CONTRÔLE)')">Taguer</button>
        
        <div id="status"></div>
    </div>
</div>

<script>
    const data = {
        "Dépôt Hantat": ["Loge de Sécurité", "Atelier", "Bureaux Administratifs", "Parking"],
        "Dépôt Sidi Moumen": ["Loge de Sécurité", "Atelier", "PCC", "Parking"],
        "Dépôt CDR": ["Loge de Sécurité", "Atelier", "Bureaux"],
        "Dépôt Sidi Bernoussi": ["Loge de Sécurité", "Atelier", "Parking"],
        "T1": ["Sidi Moumen Terminus", "Ennassim", "Mohamed Zefzaf", "Centre Maintenance", "Hôpital Sidi Moumen", "Attacharouk", "Okba Ibn Nafii", "Forces Auxiliaires", "Hay Raja", "Ibn Tachefine", "Hay Mohammadi", "Achouhada", "Ali Yaata", "Grande Ceinture", "Les Anciens Abattoirs", "Ba Hmad", "Casa Voyageurs", "Place Al Yassir", "La Résistance", "Mohamed Diouri", "Marché Central", "Place Des Nations Unies", "Place Mohamed 5", "Avenue Hassan 2", "Wafasalaf", "Faculté De Médecine", "Abdelmoumen", "Bachkou", "Mekka", "Gare Oasis", "Panoramique", "Technopark", "Zenith", "Gare Casa Sud", "Facultés", "Laymoune", "Lissasfa Terminus"],
        "T2": ["Sidi Bernoussi Terminus", "Abi Dar El Ghafari", "Gare de Ain Sbaa", "Préfecture Ain Sbaa", "AL Amane", "Wifaq", "Dar Laman", "Carrières centrales", "Kissariat Hay Mohammadi", "Mdakra", "Hay Adil", "Derb Milan", "Hay El Farah", "Derb Sultan", "Place Sraghna", "El Fida", "2 Mars", "Hermitage", "Anoual", "Derb Ghalef", "Riviera", "Ghandi", "Beauséjour", "Anfa Club", "Place financière", "Abdellah Ben Cherif", "Cité de L'air", "Sidi Abderrahmane", "Hay Hassani", "Littoral", "Ain Diab Plage Terminus"],
        "T3": ["Casa Port Terminus", "Mohammed Smiha", "Place De La victoir", "Mohamed Zerktouni", "Habous", "Garage allal", "Derb Tolba", "Derb Chorfa", "Abou Couaib Doukali", "Afriquia", "Dar Attouzani", "BD Mohammed VI", "6 NOUVEMBRE", "Abdessalam Ennaciri", "Jardin Alesco", "Hay Lalla Mariem", "Idriss El Allam", "Abdelkader Essahraoui", "10 Mars", "Hay Alwahda Terminus"],
        "T4": ["Mohammed Erradi Terminus", "Zone Industrielle", "Moulay Rachid", "Mohammed Joudar", "Faculté Ben Msik", "Hay El Falah", "Driss El Harti", "Mohammed Bouziane", "Hay Assalama", "Nil", "Jardin Chtaiba", "Hay Tissir", "Gare Oulad Ziane", "In Borja", "Ifni", "La Girande", "Jabir Ibn Hayane", "Mers Sultan", "Parc De La Ligue Arabe Terminus"],
        "BW1": ["Salmia 2 Terminus", "Sbata", "Stade Tessema", "Al Joulane", "Lahrizi", "Jardin Sunday", "Amgala", "Al Qods", "Sefrou", "Taza", "Al Inara", "Oulad Haddou", "Hay Chrifa", "Taddart", "Azzohour", "Californie", "Casa Nearshore", "Al Moustakbal", "Sidi Maarouf", "Omar Al Khayam Terminus"],
        "BW2": ["Oulmes Terminus", "Yaacoub Al Mansour", "C.I.L.", "Aéropostale", "Les musées", "Oued Oum Rabia", "Oued Laou", "Oued Beht", "Moulouya", "Haj Fateh", "Essafa", "Moulay Thami", "Abouab Oulfa", "La Rocade", "La Perception", "Les Jardins D’Errahma", "Errahma", "Oued Sbou", "Les Ecoles", "Ouled Ahmed", "La Ferme", "Ouled Azzouz Terminus"]
    };

    const chefs = ["Redouane Zaoui", "Fouad MAHMAH", "Zakia AMMARI", "Monsif MARZOUK", "Hassan MOUTTAQUINE", "El mostafa ERRAHMOUNI", "Youssef ABOUHILAL", "Anass CHOUKRI", "Rachid BAZZAZ", "Aicha ESSAHMI", "Youssef EZZAMANIDI", "Ayoub AQASBY", "Mohamed FRIMAN", "Ouissal NASSOUHE", "Mohamed REGRAGUI", "Taha NAJHI", "Mohamed CHAGUE", "Mohamed SADOK", "Samir HOUD", "Youness MAATOUS", "Azddine GOUTE", "Nourddine KARDANE", "Abdelilah HARIRI", "Bader HAMDA", "Abdelkader OUELDBA", "Samir HARIRI", "Samir AKLIA", "Zakaria LAHMITI", "Elbouazzaoui ERRAKI", "Hicham ZAHIDI", "Mounsif FOUAD", "Rachid EL HAFYANI", "El Mehdi EL MISSIOUI", "Fahd CHAHTI", "Amine MOUSSADAK", "Mouhcin RACHDAOUI", "Wadii LARHA", "Ouahid LAYLI", "Siham KASSEMI", "Aziz DOUMI", "Abderrahman BECHTAOUI"];

    window.onload = function() {
        const chefSelect = document.getElementById('chef');
        chefs.sort().forEach(c => {
            let o = document.createElement('option');
            o.value = c; o.text = c;
            chefSelect.appendChild(o);
        });
    };

    function updateStations() {
        const ligne = document.getElementById('ligne').value;
        const sSelect = document.getElementById('station');
        sSelect.innerHTML = '<option value="">-- Sélectionner Lieu --</option>';
        if (ligne && data[ligne]) {
            data[ligne].forEach(s => {
                let o = document.createElement('option');
                o.value = s; o.text = s;
                sSelect.appendChild(o);
            });
        }
    }

    function valider(typeAction) {
        const status = document.getElementById('status');
        const v = document.getElementById('service').value;
        const l = document.getElementById('ligne').value;
        const s = document.getElementById('station').value;
        const c = document.getElementById('chef').value;
        
        // --- LIEN GOOGLE SCRIPT ---
        const urlScript = "https://script.google.com/macros/s/AKfycbwteA6ZOpZPUA_-T7QkYqIRUVH3_t4EDCmAlRpemSUEfrs0EtYJtrrYy7JUQA-ARP-NpQ/exec";

        if(!v || !l || !s || !c) { alert("⚠️ Remplir tous les champs !"); return; }

        status.innerHTML = "🛰️ Envoi en cours...";
        status.style.color = "orange";

        navigator.geolocation.getCurrentPosition((pos) => {
            const gpsStr = pos.coords.latitude + ", " + pos.coords.longitude;
            
            fetch(urlScript, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ 
                    type: typeAction,
                    service: v, 
                    ligne: l, 
                    station: s, 
                    chef: c, 
                    gps: gpsStr 
                })
            }).then(() => {
                status.innerHTML = "✅ ENREGISTRÉ : " + typeAction;
                // Changement de couleur du statut selon l'action
                if (typeAction === 'FIN DE SERVICE') status.style.color = 'red';
                else if (typeAction === 'PRISE DE SERVICE') status.style.color = 'green';
                else status.style.color = 'var(--ratp-blue)';
                
                alert("✅ Confirmé : " + typeAction);
            }).catch(() => alert("❌ Erreur d'envoi"));

        }, () => alert("❌ Activez le GPS !"));
    }
</script>

</body>
</html>
